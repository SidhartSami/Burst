<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0"/>
  <title>Burst</title>
  <link rel="stylesheet" href="popup.css" />
</head>
<body>
  <div class="header">
    <div class="logo-wrap">
      <img src="../icons/icon16.png" alt="Burst" />
      <span class="logo">Burst</span>
    </div>
    <div class="status-dot" id="statusDot"></div>
  </div>

  <div class="status-label" id="statusLabel">Checking status...</div>

  <div class="divider" id="divider1"></div>

  <div class="toggle-row" id="toggleRow">
    <span>Intercept all downloads</span>
    <label class="switch">
      <input type="checkbox" id="interceptToggle" />
      <span class="slider"></span>
    </label>
  </div>



  <div class="adapters-section" id="adaptersSection">
    <div class="divider"></div>
    <div class="section-label">Active adapters (interfaces)</div>
    <div id="interfacesList" class="interfaces-list">
      <div class="interface-item loading">Connecting to Burst...</div>
    </div>
  </div>

  <div class="footer">
    <a href="#" id="openApp" class="open-app-link">Open Burst app</a>
  </div>

  <script src="popup.js"></script>
</body>
</html>
